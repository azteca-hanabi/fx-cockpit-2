name: Update News

on:
  schedule:
    - cron: '0 22 * * *'   # 毎日 JST 07:00 (UTC 22:00前日)
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch RSS and write news.json
        run: |
          pip install -q feedparser
          python3 << 'PYEOF'
          import feedparser, json, os, calendar
          from datetime import datetime, timezone

          # GOLD用ソース（pre_filtered=True: キーワードフィルタ不要）
          GOLD_SOURCES = [
              ('Investing.com 経済', 'https://jp.investing.com/rss/news_25.rss',  False),
              ('Investing.com 一般', 'https://jp.investing.com/rss/news_1.rss',   False),
              ('みんかぶFX',         'https://fx.minkabu.jp/news/rss',            False),
              ('NHK経済',            'https://www.nhk.or.jp/rss/news/cat4.xml',   False),
          ]

          # USD/JPY用ソース
          USDJPY_SOURCES = [
              ('Investing.com 外為', 'https://jp.investing.com/rss/news_285.rss', True),
              ('Investing.com 一般', 'https://jp.investing.com/rss/news_1.rss',   False),
              ('みんかぶFX',         'https://fx.minkabu.jp/news/rss',            False),
              ('NHK経済',            'https://www.nhk.or.jp/rss/news/cat4.xml',   False),
          ]

          GOLD_KEYWORDS = [
              'XAU', 'ゴールド', '金価格', '金相場', '原油', 'WTI',
              'インフレ', '貴金属', 'XAUUSD', 'コモディティ', '商品市場',
              'gold', 'GOLD', '金融緩和', 'リスク回避',
          ]

          USDJPY_KEYWORDS = [
              'ドル円', 'USD/JPY', 'USDJPY', 'FRB', 'Fed', '日銀',
              '為替', '利上げ', '利下げ', '金利', '円安', '円高',
              '為替介入', 'ドル', '円相場', '通貨',
          ]

          LIMIT_72H = 72 * 3600

          def get_iso_date(entry):
              if hasattr(entry, 'published_parsed') and entry.published_parsed:
                  ts = calendar.timegm(entry.published_parsed)
                  return datetime.fromtimestamp(ts, timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
              return ''

          def fetch_items(sources, keywords):
              items = []
              seen = set()
              now = datetime.now(timezone.utc).timestamp()
              for source_name, url, pre_filtered in sources:
                  try:
                      feed = feedparser.parse(url)
                      count = len(feed.entries)
                      print(f'{source_name}: {count} entries at {url}')
                      if count == 0:
                          print(f'  WARNING: no entries')
                      for entry in feed.entries[:30]:
                          title = entry.get('title', '')
                          link  = entry.get('link',  '')
                          if not link or link in seen:
                              continue
                          iso = get_iso_date(entry)
                          # 72時間以内フィルタ（isoDate不明の場合は通過）
                          if iso:
                              age = now - datetime.fromisoformat(iso.replace('Z', '+00:00')).timestamp()
                              if age > LIMIT_72H:
                                  continue
                          text = title + ' ' + entry.get('summary', '')
                          if pre_filtered or any(kw in text for kw in keywords):
                              seen.add(link)
                              items.append({
                                  'source':    source_name,
                                  'title':     title,
                                  'link':      link,
                                  'published': entry.get('published', ''),
                                  'isoDate':   iso,
                              })
                  except Exception as e:
                      print(f'SKIP {source_name}: {e}')
              # 新しい順にソート
              items.sort(key=lambda x: x['isoDate'] or '', reverse=True)
              return items[:30]

          gold_items   = fetch_items(GOLD_SOURCES,   GOLD_KEYWORDS)
          usdjpy_items = fetch_items(USDJPY_SOURCES, USDJPY_KEYWORDS)

          out = {
              'updated':      datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
              'gold_items':   gold_items,
              'usdjpy_items': usdjpy_items,
          }
          os.makedirs('public/data', exist_ok=True)
          with open('public/data/news.json', 'w', encoding='utf-8') as f:
              json.dump(out, f, ensure_ascii=False, indent=2)
          print(f'Saved gold={len(gold_items)}, usdjpy={len(usdjpy_items)}, updated={out["updated"]}')
          PYEOF

      - name: Commit and push news.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/news.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: update news.json $(date -u +%Y-%m-%d)"
          git push

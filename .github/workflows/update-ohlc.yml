name: Update OHLC Data

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  update-ohlc:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch OHLC and write ohlc.json
        env:
          AV_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: |
          set -e
          mkdir -p public/data

          # FX_DAILY uses OANDA spot rates — closer to TradingView than TIME_SERIES_DAILY
          fetch_fx() {
            local FROM=$1 TO=$2
            local URL="https://www.alphavantage.co/query?function=FX_DAILY&from_symbol=${FROM}&to_symbol=${TO}&outputsize=compact&apikey=${AV_KEY}"
            local RAW
            RAW=$(curl -sf "$URL")
            echo "[debug] ${FROM}${TO} first 120 chars: ${RAW:0:120}" >&2
            echo "$RAW" | python3 -c "
import sys,json
d=json.load(sys.stdin)
ts=d.get('Time Series FX (Daily)',{})
if not ts:
    print('ERROR: no FX data -', json.dumps(d)[:200], file=sys.stderr)
    sys.exit(1)
row=ts[sorted(ts)[-1]]
print(json.dumps({'open':float(row['1. open']),'high':float(row['2. high']),'low':float(row['3. low']),'close':float(row['4. close'])}))
"
          }

          XAUUSD=$(fetch_fx "XAU" "USD")
          echo "XAUUSD: $XAUUSD"
          sleep 15

          USDJPY=$(fetch_fx "USD" "JPY")
          echo "USDJPY: $USDJPY"
          sleep 15

          XAGUSD=$(fetch_fx "XAG" "USD")
          echo "XAGUSD: $XAGUSD"

          TODAY=$(date -u +%Y-%m-%d)

          export XAUUSD USDJPY XAGUSD TODAY
          python3 -c "import json,os;out={'updated':os.environ['TODAY'],'XAUUSD':json.loads(os.environ['XAUUSD']),'USDJPY':json.loads(os.environ['USDJPY']),'XAGUSD':json.loads(os.environ['XAGUSD'])};open('public/data/ohlc.json','w').write(json.dumps(out,indent=2));print('Done:',out['updated'])"

      - name: Commit and push ohlc.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/ohlc.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: update ohlc.json $(date -u +%Y-%m-%d)"
          git push

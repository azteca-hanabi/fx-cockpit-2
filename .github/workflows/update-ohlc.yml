name: Update OHLC Data

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  update-ohlc:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch OHLC and write ohlc.json
        env:
          FETCH_SCRIPT: |
            import yfinance as yf, json, os
            from datetime import date
            # GC=F: Gold futures (CME, USD/oz) — closest to TradingView XAUUSD spot
            # SIVR: Aberdeen Physical Silver ETF (1 share ≈ 0.9987 oz) — closest to TradingView XAGUSD spot
            # JPY=X: USD/JPY spot rate
            SYMBOLS = {"XAUUSD": "GC=F", "USDJPY": "JPY=X", "XAGUSD": "SIVR"}
            out = {"updated": str(date.today())}
            for key, sym in SYMBOLS.items():
                hist = yf.Ticker(sym).history(period="5d", end=str(date.today()))
                if hist.empty:
                    raise SystemExit(f"No data for {sym}")
                row = hist.iloc[-1]
                out[key] = {"open": float(row["Open"]), "high": float(row["High"]), "low": float(row["Low"]), "close": float(row["Close"])}
                print(f"{key}: {out[key]}")
            os.makedirs("public/data", exist_ok=True)
            open("public/data/ohlc.json", "w").write(json.dumps(out, indent=2))
            print("Done:", out["updated"])
        run: |
          pip install -q yfinance
          python3 -c "$FETCH_SCRIPT"

      - name: Commit and push ohlc.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/ohlc.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: update ohlc.json $(date -u +%Y-%m-%d)"
          git push

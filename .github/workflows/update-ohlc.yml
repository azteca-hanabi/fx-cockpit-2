name: Update OHLC Data

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  update-ohlc:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch OHLC and write ohlc.json
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          FETCH_SCRIPT: |
            import urllib.request, urllib.parse, json, os
            from datetime import date

            API_KEY = os.environ["TWELVE_DATA_API_KEY"]
            SYMBOLS = {"XAUUSD": "XAU/USD", "USDJPY": "USD/JPY"}
            out = {"updated": str(date.today())}

            for key, sym in SYMBOLS.items():
                params = urllib.parse.urlencode({"symbol": sym, "interval": "1day", "outputsize": 2, "apikey": API_KEY})
                url = f"https://api.twelvedata.com/time_series?{params}"
                req = urllib.request.Request(url, headers={"User-Agent": "fx-cockpit/1.0"})
                with urllib.request.urlopen(req) as r:
                    data = json.loads(r.read())
                if "values" not in data:
                    raise SystemExit(f"Error for {sym}: {data}")
                v = data["values"][0]
                out[key] = {"open": float(v["open"]), "high": float(v["high"]), "low": float(v["low"]), "close": float(v["close"])}
                print(f"{key}: {out[key]}")

            os.makedirs("public/data", exist_ok=True)
            open("public/data/ohlc.json", "w").write(json.dumps(out, indent=2))
            print("Done:", out["updated"])
        run: |
          python3 -c "$FETCH_SCRIPT"

      - name: Commit and push ohlc.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/ohlc.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: update ohlc.json $(date -u +%Y-%m-%d)"
          git push

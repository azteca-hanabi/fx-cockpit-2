name: Update Coins List

on:
  schedule:
    - cron: '0 18 * * *'   # 毎日 JST 03:00 (UTC 18:00)
  workflow_dispatch:

jobs:
  update-coins:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch coins list from CoinGecko
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os
          from datetime import datetime, timezone

          url = "https://api.coingecko.com/api/v3/coins/list"
          req = urllib.request.Request(
              url,
              headers={"User-Agent": "fx-cockpit/1.0", "Accept": "application/json"}
          )

          print(f"Fetching: {url}")
          with urllib.request.urlopen(req, timeout=30) as r:
              raw = json.loads(r.read())

          print(f"Total coins fetched: {len(raw)}")

          coins = []
          for c in raw:
              symbol = (c.get("symbol") or "").upper()
              name   = c.get("name") or ""
              if not symbol or not name:
                  continue
              coins.append({
                  "symbol": symbol,
                  "name":   name,
                  "id":     c.get("id") or ""
              })

          out = {
              "updated": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "coins":   coins
          }

          os.makedirs("public/data", exist_ok=True)
          with open("public/data/coins.json", "w", encoding="utf-8") as f:
              json.dump(out, f, ensure_ascii=False, separators=(",", ":"))

          print(f"Saved {len(coins)} coins. updated={out['updated']}")
          PYEOF

      - name: Commit and push coins.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/coins.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: update coins.json $(date -u +%Y-%m-%d)"
          git push

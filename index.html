<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FX COCKPIT — azteca</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ─── THEMES ─── */
:root,
[data-theme="dark"] {
  --bg:         #0a0a0f;
  --bg2:        #0f0f18;
  --bg3:        #14141f;
  --border:     #1e1e2e;
  --border2:    #2a2a40;
  --text:       #c8c8d8;
  --muted:      #5a5a7a;
  --gold:       #f0b429;
  --gold-dim:   #7a5a10;
  --silver:     #a8b8cc;
  --silver-dim: #3a4a58;
  --cyan:       #38c9c9;
  --cyan-dim:   #0e4040;
  --green:      #2ecc71;
  --red:        #e74c3c;
  --scanline:   1;
}


[data-theme="light"] {
  --bg:         #f0f0f8;
  --bg2:        #e4e4f0;
  --bg3:        #ffffff;
  --border:     #d0d0e0;
  --border2:    #b8b8cc;
  --text:       #1a1a30;
  --muted:      #7878a0;
  --gold:       #a86e00;
  --gold-dim:   #f5e8c0;
  --silver:     #4a6070;
  --silver-dim: #ccd8e4;
  --cyan:       #006888;
  --cyan-dim:   #c0e8f4;
  --green:      #1a7a3a;
  --red:        #c01818;
  --scanline:   0;
}

/* ─── RESET ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 16px;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
  transition: background .2s, color .2s;
}

/* scanline */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px);
  pointer-events: none;
  z-index: 9999;
  opacity: var(--scanline);
  transition: opacity .2s;
}

/* ─── HEADER ─── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px;
  height: 52px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
  gap: 8px;
  min-width: 0;
}

.logo {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: .06em;
  color: var(--cyan);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
}
.logo span {
  color: var(--muted);
  font-size: 11px;
  font-weight: 400;
  margin-left: 6px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

#clock {
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  white-space: nowrap;
  letter-spacing: .03em;
}

/* ─── THEME SWITCHER ─── */
.theme-switcher {
  display: flex;
  gap: 3px;
}

.theme-btn {
  padding: 5px 8px;
  border-radius: 4px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
  line-height: 1;
}
.theme-btn:hover { color: var(--text); border-color: var(--muted); }
.theme-btn.active {
  border-color: var(--cyan);
  color: var(--cyan);
  background: rgba(56,201,201,.1);
}

/* ─── SESSION BAR ─── */
#session-bar {
  display: flex;
  gap: 6px;
  padding: 8px 12px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-wrap: nowrap;
}

.session-pill {
  font-size: 12px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 3px;
  border: 1px solid var(--border2);
  color: var(--muted);
  letter-spacing: .04em;
  transition: all .3s;
  white-space: nowrap;
}
.session-pill.active {
  color: var(--green);
  border-color: var(--green);
  background: rgba(46,204,113,.08);
  box-shadow: 0 0 8px rgba(46,204,113,.2);
}
.session-pill .dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
  margin-right: 5px;
  vertical-align: middle;
}
.session-pill.active .dot { animation: blink 1.4s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

/* ─── TABS ─── */
.tab-bar {
  display: flex;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.tab-btn {
  flex: 1;
  height: 48px;
  background: none;
  border: none;
  border-bottom: 3px solid transparent;
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: .06em;
  color: var(--muted);
  transition: color .2s, border-color .2s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn[data-tab="gold"].active    { color: var(--gold);   border-color: var(--gold); }
.tab-btn[data-tab="usdjpy"].active  { color: var(--cyan);   border-color: var(--cyan); }

/* ─── TAB PANELS ─── */
.tab-panel {
  display: none;
  flex: 1;
  flex-direction: column;
  overflow-y: auto;
  padding: 14px 12px 32px;
  gap: 14px;
}
.tab-panel.active { display: flex; }

/* ─── SECTION HEADING ─── */
.sec-heading {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .08em;
  color: var(--muted);
  text-transform: uppercase;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

/* ─── CHART ROW ─── */
.chart-row {
  display: flex;
  gap: 8px;
  align-items: stretch;
}

.tv-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 20px 12px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text);
  text-decoration: none;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: .04em;
  transition: background .15s, border-color .15s, color .15s;
  min-height: 110px;
  text-align: center;
}
.tv-btn:hover {
  background: rgba(56,201,201,.06);
  border-color: var(--cyan-dim);
  color: var(--cyan);
}
.tv-icon { font-size: 30px; }

.chart-side {
  display: flex;
  flex-direction: column;
  gap: 6px;
  width: 36%;
  flex-shrink: 0;
}

.side-btn {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px 6px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 6px;
  color: var(--text);
  text-decoration: none;
  font-size: 12px;
  font-weight: 500;
  text-align: center;
  letter-spacing: .02em;
  transition: background .15s, color .15s;
  line-height: 1.3;
}
.side-btn:hover {
  background: rgba(128,128,200,.06);
  color: var(--text);
}

/* ─── APP LAUNCH ─── */
.app-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.app-btn {
  display: block;
  padding: 18px 10px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: .06em;
  cursor: pointer;
  transition: all .15s;
  text-align: center;
  text-decoration: none;
}
.app-btn:hover {
  background: rgba(56,201,201,.06);
  border-color: var(--cyan-dim);
  color: var(--cyan);
}
.app-sub {
  display: block;
  font-size: 11px;
  font-weight: 400;
  color: var(--muted);
  margin-top: 5px;
  letter-spacing: .04em;
}

/* ─── NEWS SECTION ─── */
.news-updated {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 8px;
  letter-spacing: .03em;
}

#news-list, #usdjpy-news-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.news-item {
  padding: 10px 12px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 6px;
}

.news-source {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: .03em;
  margin-bottom: 4px;
}

.news-title {
  font-size: 13px;
  color: var(--text);
  text-decoration: none;
  line-height: 1.45;
  display: block;
}
.news-title:hover { color: var(--gold); }

/* ─── TRADINGVIEW WIDGET ─── */
.tv-widget-wrap {
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border2);
}
.tradingview-widget-copyright {
  padding: 2px 8px 4px;
  background: transparent;
  font-size: 11px;
  line-height: 1.4;
}
.tradingview-widget-copyright .blue-text {
  color: var(--muted) !important;
  text-decoration: underline;
}

/* ─── SMALL SCREEN ADJUSTMENTS ─── */
@media (max-width: 360px) {
  #clock { font-size: 11px; }
}
</style>
</head>

<script>
// ─── TRADINGVIEW APP LAUNCH WITH WEB FALLBACK ───
document.querySelectorAll('[data-tv-symbol]').forEach(btn => {
  btn.addEventListener('click', function (e) {
    e.preventDefault();
    const webUrl = this.dataset.tvWeb;
    const symbol = this.dataset.tvSymbol;
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    if (!isMobile) {
      // PCはアプリ起動を試みない（window.location変更でページが破壊されるため）
      window.open(webUrl, '_blank', 'noopener,noreferrer');
      return;
    }

    // モバイル: アプリ起動を試みて1500ms後にフォールバック
    let appOpened = false;
    const onHide = () => {
      if (document.hidden) {
        appOpened = true;
        clearTimeout(timer);
        document.removeEventListener('visibilitychange', onHide);
      }
    };
    document.addEventListener('visibilitychange', onHide);

    const timer = setTimeout(() => {
      document.removeEventListener('visibilitychange', onHide);
      if (!appOpened) window.open(webUrl, '_blank', 'noopener,noreferrer');
    }, 1500);

    window.location.href = `tradingview://chart?symbol=${symbol}`;
  });
});

// ─── TRADINGVIEW WIDGETS ───
function createTVWidget(wrapId, symbol) {
  const wrap = document.getElementById(wrapId);
  if (!wrap) return;
  const theme = document.documentElement.dataset.theme === 'dark' ? 'dark' : 'light';
  // コンテナをリセットして新しいウィジェットを注入
  wrap.innerHTML = `
    <div class="tradingview-widget-container">
      <div class="tradingview-widget-container__widget"></div>
      <div class="tradingview-widget-copyright">
        <a href="https://www.tradingview.com/" rel="noopener nofollow" target="_blank">
          <span class="blue-text">Track all markets on TradingView</span>
        </a>
      </div>
    </div>`;
  const s = document.createElement('script');
  s.src = 'https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js';
  // async=false にしないと動的生成時に document.currentScript が null になり
  // TradingView が設定JSONを読めなくなる（Chrome既知の挙動）
  s.async = false;
  s.innerHTML = JSON.stringify({ symbol, width: '100%', height: 110, colorTheme: theme, isTransparent: false, locale: 'ja' });
  wrap.querySelector('.tradingview-widget-container').appendChild(s);
}

function initTVWidgets() {
  createTVWidget('tv-gold-wrap',   'OANDA:XAUUSD');
  createTVWidget('tv-usdjpy-wrap', 'OANDA:USDJPY');
}

// ─── THEME ───
(function () {
  const saved = localStorage.getItem('fx-theme') || 'dark';
  document.documentElement.dataset.theme = saved;
  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.theme === saved);
  });
})();

document.querySelectorAll('.theme-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const t = btn.dataset.theme;
    document.documentElement.dataset.theme = t;
    localStorage.setItem('fx-theme', t);
    document.querySelectorAll('.theme-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.theme === t);
    });
    initTVWidgets();
  });
});

initTVWidgets();

// bfcache（戻るボタン等）から復帰した場合も再初期化
window.addEventListener('pageshow', event => {
  if (event.persisted) initTVWidgets();
});

// ─── CLOCK ───
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  const s = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('clock').textContent = `${h}:${m}:${s} JST`;
}
setInterval(updateClock, 1000);
updateClock();

// ─── SESSIONS (JST基準) ───
function updateSessions() {
  const now = new Date();
  const h = now.getHours() + now.getMinutes() / 60;

  function active(start, end) {
    if (end <= 24) return h >= start && h < end;
    return h >= start || h < (end - 24);
  }

  document.getElementById('sess-tokyo').classList.toggle('active',  active(8, 15));
  document.getElementById('sess-london').classList.toggle('active', active(16, 25));
  document.getElementById('sess-ny').classList.toggle('active',     active(21, 30));
}
setInterval(updateSessions, 10000);
updateSessions();

// ─── TABS ───
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`panel-${tab}`).classList.add('active');
  });
});

// ─── NEWS ───
function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

async function loadNews() {
  try {
    const res = await fetch(`public/data/news.json?t=${Date.now()}`);
    if (!res.ok) return;
    const d = await res.json();

    // 更新時刻をJST表示
    let dateStr = '';
    if (d.updated) {
      const dt = new Date(d.updated);
      const jst = new Date(dt.getTime() + 9 * 60 * 60 * 1000);
      const mm = String(jst.getUTCMonth() + 1).padStart(2, '0');
      const dd = String(jst.getUTCDate()).padStart(2, '0');
      const hh = String(jst.getUTCHours()).padStart(2, '0');
      const mi = String(jst.getUTCMinutes()).padStart(2, '0');
      dateStr = `更新: ${mm}/${dd} ${hh}:${mi} JST`;
    }

    const now = Date.now();
    const limit72h = 72 * 60 * 60 * 1000;

    function filterItems(items) {
      if (!items || items.length === 0) return [];
      return items
        .filter(item => {
          if (!item.isoDate) return true;
          return (now - new Date(item.isoDate).getTime()) <= limit72h;
        })
        .slice(0, 10);
    }

    function fmtJST(iso) {
      if (!iso) return '';
      const jst = new Date(new Date(iso).getTime() + 9 * 60 * 60 * 1000);
      const mm = String(jst.getUTCMonth() + 1).padStart(2, '0');
      const dd = String(jst.getUTCDate()).padStart(2, '0');
      const hh = String(jst.getUTCHours()).padStart(2, '0');
      const mi = String(jst.getUTCMinutes()).padStart(2, '0');
      return `${mm}/${dd} ${hh}:${mi}`;
    }

    function renderItems(items) {
      if (items.length === 0) {
        return '<p style="color:var(--muted);font-size:12px;padding:6px 0">ニュースはありません</p>';
      }
      return items.map(item => {
        const t = fmtJST(item.isoDate);
        const meta = escHtml(item.source) + (t ? ` · ${t}` : '');
        return `<div class="news-item">` +
          `<div class="news-source">${meta}</div>` +
          `<a class="news-title" href="${escHtml(item.link)}" target="_blank" rel="noopener">${escHtml(item.title)}</a>` +
        `</div>`;
      }).join('');
    }

    // GOLD（gold_items優先、旧形式items fallback）
    const goldItems = filterItems(d.gold_items || d.items || []);
    document.getElementById('news-updated').textContent = dateStr;
    document.getElementById('news-list').innerHTML = renderItems(goldItems);

    // USD/JPY（usdjpy_items優先、旧形式items fallback）
    const usdjpyItems = filterItems(d.usdjpy_items || d.items || []);
    document.getElementById('usdjpy-news-updated').textContent = dateStr;
    document.getElementById('usdjpy-news-list').innerHTML = renderItems(usdjpyItems);

  } catch (e) {
    console.warn('News load failed:', e);
  }
}
loadNews();

// ─── SERVICE WORKER ───
if ('serviceWorker' in navigator) {
  // controllerchangeはiOSを含む全環境で最も確実なSW切替検知
  let swRefreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (!swRefreshing) {
      swRefreshing = true;
      window.location.reload();
    }
  });

  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .catch(err => console.warn('SW registration failed:', err));
  });
}
</script>
